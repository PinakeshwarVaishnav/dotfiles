# --- BATTERY HEALTH (Essential for Lifespan) ---
# Prevents chemical wear by keeping battery between 75-80%
START_CHARGE_THRESH_BAT0=75
STOP_CHARGE_THRESH_BAT0=80

# --- CPU PERFORMANCE & THERMALS (The "Cold" Settings) ---
CPU_SCALING_GOVERNOR_ON_AC=powersave
CPU_SCALING_GOVERNOR_ON_BAT=powersave

# Forces CPU to prioritize lowest power/heat even when plugged in
CPU_ENERGY_PERF_POLICY_ON_AC=power
CPU_ENERGY_PERF_POLICY_ON_BAT=power

# Absolute limits to prevent heat spikes
CPU_MIN_PERF_ON_AC=0
CPU_MAX_PERF_ON_AC=100
CPU_MAX_PERF_ON_BAT=60

# Disable Turbo Boost (The #1 cause of heat in i5/i7 laptops)
CPU_BOOST_ON_AC=0
CPU_BOOST_ON_BAT=0

# Disable Dynamic Boost to keep temperatures flat and stable
CPU_HWP_DYN_BOOST_ON_AC=0
CPU_HWP_DYN_BOOST_ON_BAT=0

# --- GPU & BUS EFFICIENCY ---
# Lowers GPU ceiling to keep the core cold
INTEL_GPU_MIN_FREQ_ON_AC=100
INTEL_GPU_MAX_FREQ_ON_AC=500
INTEL_GPU_MIN_FREQ_ON_BAT=100
INTEL_GPU_MAX_FREQ_ON_BAT=500

# Aggressive power management for internal components
PCIE_ASPM_ON_AC=powersave
PCIE_ASPM_ON_BAT=powersave

# --- SYSTEM SETTINGS ---
# Remembers Wi-Fi/BT state to reduce hardware cycling
RESTORE_DEVICE_STATE_ON_STARTUP=1
