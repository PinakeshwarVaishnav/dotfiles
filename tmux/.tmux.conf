# Settng the prefix from C-b to C-a
set -g prefix C-a

# Free the original Ctrl-b prefix keybinding
unbind C-b

# setting the delay between prefix and command
set -s escape-time 1

# Set the base index for windows to 1 instead of 0
set -g base-index 1

# Set the base index for panes to 1 instead of 0
setw -g pane-base-index 1

# Reload the file with Prefix r
bind r source-file ~/.tmux.conf \; display "Reloaded!"

# Ensure that we can send Ctrl-A to other apps
bind C-a send-prefix

# Ergonomic Splits: v = vertical, s = horizontal
# Opens in current path to save you from repetitive 'cd' typing
bind v split-window -h -c "#{pane_current_path}"
bind s split-window -v -c "#{pane_current_path}"

# Ergonomic New Window: 't' for Tab or Alt+n for instant new window
bind t new-window -c "#{pane_current_path}"
bind -n M-n new-window -c "#{pane_current_path}"

# Pane Navigation: Alt + hjkl (No prefix)
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R

# Quick window selection
bind -r C-h select-window -t :-
bind -r C-l select-window -t :+

# Pane Resizing: Alt + Shift + hjkl (No prefix)
# Eliminates 'Prefix-Claw' tension; uses the thumb (Alt) and home row
bind -n M-H resize-pane -L 5
bind -n M-J resize-pane -D 5
bind -n M-K resize-pane -U 5
bind -n M-L resize-pane -R 5

# mouse support - set to on if you want to use the mouse
set -g mouse on
# Efficient Scrolling: 3 lines per flick instead of 1
# Reduces repetitive strain on the index finger/scroll wheel
bind -T copy-mode-vi WheelUpPane select-pane \; send-keys -X cursor-up \; send-keys -X cursor-up \; send-keys -X cursor-up
bind -T copy-mode-vi WheelDownPane select-pane \; send-keys -X cursor-down \; send-keys -X cursor-down \; send-keys -X cursor-down

# Set the default terminal mode to 256color mode
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# set the status line's colors (Transparent background)
set -g status-style fg='#d3c6aa',bg='#323c41' # Matches Everforest statusline

# set the color of the window list (Muted cyan)
setw -g window-status-style fg=colour6,bg=default

# set colors for the active window (Underlined/White, no red block)
setw -g window-status-current-style fg='#a7c080',bg='#323c41',bold,underscore

# colors for pane borders
setw -g pane-border-style fg='#323c41',bg='#232a2e'
setw -g pane-active-border-style fg='#a7c080',bg='#2b3339'

# Inactive pane: Dimmed and slightly darker
setw -g window-style fg='#859289',bg='#232a2e'        # Muted green-grey text, deep background
setw -g window-active-style fg='#d3c6aa',bg='#2b3339' # Everforest foreground and background

# Command / message line
set -g message-style fg='#e67e80',bg='#3c4841',bold 

# Status line left side to show Session:window:pane
set -g status-left-length 40
set -g status-left "#[fg='#83c092',bold] Session: #S #[fg='#859289']#I:#P"

# Status line right side - 31-Oct 13:37
set -g status-right "#[fg='#dbbc7f'] 20-20-20 Rule #[fg='#859289']| %H:%M "

# Update the status line every sixty seconds
set -g status-interval 60

# Center the window list in the status line
set -g status-justify centre

# Focus Protection: Disable activity alerts
# Eliminates peripheral flicker; reduces eye darting and cognitive load
setw -g monitor-activity off
set -g visual-activity off

# Lazy Toggle: Press Ctrl+a then 'a' to jump back to your previous window
# Significant reduction in total hand movement for the most common task
bind a last-window

# Cycle windows with Alt + h/l (or Alt + Left/Right)
# This mimics the way you move between panes, but for windows
bind -n M-h previous-window
bind -n M-l next-window
